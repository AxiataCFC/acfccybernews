<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACFC | SDP — Open Requests</title>
<link rel="stylesheet" href="sentinel.css">
<style>
.page { display:flex; flex-direction:column; height:100vh; }

/* TICKER */
.update-ticker { background:rgba(0,120,212,0.07); border-bottom:1px solid var(--border); height:28px; display:flex; align-items:center; overflow:hidden; flex-shrink:0; }
.update-label  { font-size:10px; font-weight:700; letter-spacing:1.5px; color:#fff; background:var(--sentinel-blue); padding:0 14px; height:100%; display:flex; align-items:center; white-space:nowrap; flex-shrink:0; }
.update-track  { overflow:hidden; flex:1; }
.update-inner  { display:flex; gap:48px; white-space:nowrap; animation:tickerScroll 60s linear infinite; }
.update-inner span { font-size:10px; color:var(--sentinel-blue); }
.update-inner .sep { color:var(--text-dim); }
@keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* TABLE WRAPPER */
.table-wrap { flex:1; overflow-y:auto; padding:0; }
.table-wrap::-webkit-scrollbar { width:4px; }
.table-wrap::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

/* PANEL HEADER */
.tbl-header {
  display:flex; align-items:center; gap:10px;
  padding:14px 24px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--bg-panel);
}
.tbl-header-title { font-size:15px; font-weight:600; color:var(--text-bright); }
.tbl-header-count { font-size:12px; color:var(--text-dim); margin-left:auto; }

/* REQUEST TABLE */
.req-table { width:100%; border-collapse:collapse; }
.req-table th {
  text-align:left; padding:10px 24px;
  color:var(--text-dim); border-bottom:1px solid var(--border);
  font-weight:500; font-size:10px; letter-spacing:1px;
  text-transform:uppercase; background:var(--bg-base);
  position:sticky; top:0; z-index:1;
}
.req-row { cursor:default; animation:rowIn 0.35s ease forwards; opacity:0; }
.req-row.flash { animation:rowFlash 2s ease forwards; }
@keyframes rowIn   { to { opacity:1; } }
@keyframes rowFlash {
  0%   { opacity:0; background:rgba(0,120,212,0.28); }
  50%  { opacity:1; background:rgba(0,120,212,0.14); }
  100% { opacity:1; background:transparent; }
}
.req-row td {
  padding:14px 24px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  vertical-align:middle;
}
.req-row:hover td { background:var(--bg-hover); }

.req-id   { font-family:monospace; font-size:13px; color:var(--text-dim); white-space:nowrap; width:70px; }
.req-subj { }
.opco-name { font-size:13px; font-weight:600; color:var(--sentinel-blue); display:block; margin-bottom:3px; }
.subj-text { font-size:12px; color:var(--text); }
.col-opco  { font-size:12px; color:var(--text-dim); white-space:nowrap; width:80px; }
.col-tech  { font-size:12px; color:var(--text); white-space:nowrap; width:160px; }
.col-prio  { font-size:13px; font-weight:600; white-space:nowrap; width:60px; }
.col-sla   { font-size:12px; font-weight:600; white-space:nowrap; width:140px; }

/* STATUS BADGES */
.badge { display:inline-block; font-size:10px; padding:3px 10px; border-radius:3px; font-weight:500; white-space:nowrap; }
.s-new      { background:rgba(241,112,123,.15); color:#f1707b; border:1px solid rgba(241,112,123,.35); }
.s-progress { background:rgba(40,153,245,.15);  color:#2899f5; border:1px solid rgba(40,153,245,.35); }
.s-pending  { background:rgba(255,140,0,.15);   color:#ff8c00; border:1px solid rgba(255,140,0,.35); }
.s-closed   { background:rgba(22,198,12,.12);   color:#16c60c; border:1px solid rgba(22,198,12,.25); }
</style>
</head>
<body>
<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-placeholder" onclick="document.getElementById('logo-upload').click()">[ LOGO ]</div>
      <input type="file" id="logo-upload" accept="image/*" onchange="handleLogo(event)">
      <img id="logo-img" src="" alt="">
    </div>
    <div>
      <div class="topbar-title">Axiata Cyber Fusion Center</div>
      <div class="topbar-sub">ServiceDesk Plus — Open Requests</div>
    </div>
    <nav class="topbar-nav">
      <a href="index.html"       class="nav-item">Overview</a>
      <a href="incidents.html"   class="nav-item active">SDP</a>
      <a href="edr.html"         class="nav-item">EDR / XDR</a>
      <a href="acta.html"        class="nav-item">ACTA</a>
      <a href="intel.html"       class="nav-item">Threat Intel</a>
    </nav>
    <div class="topbar-right">
      <span class="topbar-badge"><span class="live-dot"></span>LIVE</span>
      <span class="topbar-clock" id="clock">--:--:--</span>
    </div>
  </div>

  <!-- TICKER -->
  <div class="update-ticker">
    <div class="update-label">UPDATES</div>
    <div class="update-track">
      <div class="update-inner" id="ticker-inner"><span>Loading…</span></div>
    </div>
  </div>

  <!-- TABLE HEADER -->
  <div class="tbl-header" style="background:var(--bg-panel);">
    <span class="status-dot blue pulse"></span>
    <span class="tbl-header-title">Open Requests — All OpCos</span>
    <span class="tbl-header-count" id="req-count">— open requests</span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="req-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Subject</th>
          <th>OpCo</th>
          <th>Technician</th>
          <th>Status</th>
          <th>Prio</th>
          <th>SLA</th>
        </tr>
      </thead>
      <tbody id="req-tbody"></tbody>
    </table>
  </div>

</div>

<script>
// CLOCK
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
}
setInterval(tick, 1000); tick();

function handleLogo(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = ev => {
    document.getElementById('logo-img').src = ev.target.result;
    document.getElementById('logo-img').style.display = 'block';
    document.querySelector('.topbar-logo-placeholder').style.display = 'none';
  }; r.readAsDataURL(f);
}

// DATA
const REQS = [
  { id:11352, opco:'SMART', tech:'Haziq Muhammad',     subject:'Global IT PR T1098 NCR Windows User Account Enabled or Disabled', status:'In Progress',               prio:'P2', slaHrs:0.4  },
  { id:11351, opco:'HDM',   tech:'Irfan Ismail',       subject:'TI Map IP Entity to CommonSecurityLog',                           status:'Pending OpCo Verification', prio:'P3', slaHrs:1.2  },
  { id:11350, opco:'EDOT',  tech:'Irfan Ismail',       subject:'Unfamiliar sign-in properties involving one user',                status:'Pending OpCo Verification', prio:'P3', slaHrs:2.1  },
  { id:11349, opco:'ADL',   tech:'Irfan Ismail',       subject:'Impossible travel activity involving one user',                   status:'Pending OpCo Verification', prio:'P3', slaHrs:-0.3 },
  { id:11348, opco:'ADL',   tech:'Satheya Elangohvan', subject:'NRT Authentication Methods Changed for VIP Users',                status:'Pending OpCo Verification', prio:'P2', slaHrs:-1.1 },
  { id:11347, opco:'XL',    tech:'Irfan Ismail',       subject:'Global IT PR T1098 NCR Windows User Account Enabled or Disabled', status:'Pending OpCo Verification', prio:'P3', slaHrs:3.8  },
  { id:11346, opco:'DGIT',  tech:'Satheya Elangohvan', subject:'Imperva — Multiple user agents from same source',                 status:'Pending OpCo Verification', prio:'P3', slaHrs:5.2  },
  { id:11345, opco:'DGIT',  tech:'Satheya Elangohvan', subject:'Imperva — Request from unexpected countries',                     status:'In Progress',               prio:'P3', slaHrs:6.7  },
  { id:11344, opco:'CDB',   tech:'Satheya Elangohvan', subject:'CEL APP T1566 RD T1S NCR Web MPS HIGH Risk Alert — Celcom',       status:'In Progress',               prio:'P2', slaHrs:8.4  },
];

const NEW_REQ = { id:11353, opco:'BOBA', tech:'Ameerah Hamid', subject:'A workload was launched in an unusual way in cluster production-bankapp', status:'New', prio:'P2', slaHrs:0.1 };

const prioColor = { P1:'#f1707b', P2:'#ff8c00', P3:'#2899f5', P4:'#8b949e' };
const statusClass = {
  'New':                       's-new',
  'In Progress':               's-progress',
  'Pending OpCo Verification': 's-pending',
  'Closed':                    's-closed',
};

function slaLabel(h) {
  if (h < 0)  return `<span class="col-sla" style="color:#f1707b">BREACHED ${Math.abs(h).toFixed(1)}h ago</span>`;
  if (h < 2)  return `<span class="col-sla" style="color:#ff8c00">${h.toFixed(1)}h left</span>`;
  if (h < 24) return `<span class="col-sla" style="color:var(--text-dim)">${h.toFixed(1)}h left</span>`;
  return `<span class="col-sla" style="color:var(--text-dim)">${Math.floor(h/24)}d left</span>`;
}

function buildRow(req, isNew = false) {
  const tr = document.createElement('tr');
  tr.className = 'req-row' + (isNew ? ' flash' : '');
  tr.innerHTML = `
    <td class="req-id">#${req.id}</td>
    <td class="req-subj">
      <span class="opco-name">${req.opco}</span>
      <span class="subj-text">${req.subject}</span>
    </td>
    <td class="col-opco">${req.opco}</td>
    <td class="col-tech">${req.tech}</td>
    <td><span class="badge ${statusClass[req.status] || ''}">${req.status}</span></td>
    <td class="col-prio" style="color:${prioColor[req.prio]}">${req.prio}</td>
    <td>${slaLabel(req.slaHrs)}</td>`;
  return tr;
}

let currentReqs = [...REQS];

function renderTable() {
  const tb = document.getElementById('req-tbody');
  tb.innerHTML = '';
  currentReqs.forEach((r, i) => {
    const tr = buildRow(r);
    tr.style.animationDelay = i * 0.06 + 's';
    tb.appendChild(tr);
  });
  const open = currentReqs.filter(r => r.status !== 'Closed').length;
  document.getElementById('req-count').textContent = `${open} open requests`;
}
renderTable();

function buildTicker(reqs) {
  const items = reqs.map(r =>
    `<span>[#${r.id}] ${r.opco} · ${r.subject.substring(0,60)}${r.subject.length>60?'…':''} — ${r.status}</span><span class="sep"> · </span>`
  ).join('');
  document.getElementById('ticker-inner').innerHTML = items + items;
}
buildTicker(currentReqs);

// LIVE UPDATES
const updates = [
  { type:'update', id:11347, field:'status', val:'In Progress' },
  { type:'new',    req: NEW_REQ },
  { type:'update', id:11345, field:'status', val:'Pending OpCo Verification' },
  { type:'update', id:11344, field:'status', val:'Closed' },
  { type:'update', id:11350, field:'status', val:'In Progress' },
];

function applyUpdate(u) {
  if (u.type === 'new') {
    currentReqs.unshift(u.req);
    const tr = buildRow(u.req, true);
    document.getElementById('req-tbody').insertBefore(tr, document.getElementById('req-tbody').firstChild);
  } else if (u.type === 'update') {
    const req = currentReqs.find(r => r.id === u.id);
    if (req) {
      req[u.field] = u.val;
      document.querySelectorAll('#req-tbody tr').forEach(row => {
        const idEl = row.querySelector('.req-id');
        if (idEl && idEl.textContent === `#${u.id}`) {
          row.classList.add('flash');
          const badge = row.querySelector('.badge');
          if (badge) { badge.className = `badge ${statusClass[u.val]||''}`; badge.textContent = u.val; }
          setTimeout(() => row.classList.remove('flash'), 2500);
        }
      });
    }
  }
  const open = currentReqs.filter(r => r.status !== 'Closed').length;
  document.getElementById('req-count').textContent = `${open} open requests`;
  buildTicker(currentReqs.filter(r => r.status !== 'Closed'));
}

[14000, 28000, 43000, 57000, 72000].forEach((delay, i) => {
  setTimeout(() => { if (i < updates.length) applyUpdate(updates[i]); }, delay);
});
</script>
</body>
</html>
